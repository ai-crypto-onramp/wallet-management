version: "2"

linters:
  # Default linters (govet, staticcheck, errcheck, ineffassign, unused)
  # are enabled automatically. We add gocyclo + misspell on top.
  # errcheck is disabled: the codebase has many intentional unchecked
  # errors (defer Close(), fmt.Fprintf, json.Encode, tx.Rollback).
  enable:
    - gocyclo
    - misspell
  disable:
    - errcheck
  settings:
    gocyclo:
      min-complexity: 20
  exclusions:
    rules:
      # Tests: allow complex table cases.
      - path: _test\.go
        linters:
          - gocyclo
      # Low-value staticcheck quick-fix suggestions.
      - linters:
          - staticcheck
        text: "SA9003|QF1006|ST1023|QF1011|QF1001|QF1003|QF1012|SA1012|SA4001|SA4027|S1021|S1039"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
